name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

permissions:
  contents: read

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - run: yarn biome ci .

  knip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - run: yarn knip --reporter github-actions
        env:
          PLAYWRIGHT_BASE_URL: https://example.com

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - run: yarn test

  build:
    runs-on: ubuntu-latest
    needs: [biome, knip, typecheck, test]
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      deployments: write
    environment:
      name: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      IS_DEFAULT_BRANCH: ${{ github.ref_name == github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - uses: brianespinosa/next-build-cache@main
      - run: yarn vercel pull --yes --token $VERCEL_TOKEN
      - run: |
          if [[ "$IS_DEFAULT_BRANCH" == "true" ]]; then
            yarn vercel build --prod
          else
            yarn vercel build
          fi
      - id: deploy
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            URL=$(yarn vercel deploy --prebuilt --token $VERCEL_TOKEN)
          else
            URL=$(yarn vercel deploy --prebuilt --prod --token $VERCEL_TOKEN)
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

  e2e:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    env:
      PLAYWRIGHT_BASE_URL: ${{ needs.build.outputs.url }}
      VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ./.github/actions/setup
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(jq -r '.devDependencies["@playwright/test"]' package.json)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install chromium --with-deps
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium
      - name: Run Playwright tests
        run: yarn e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
