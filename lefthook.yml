pre-commit:
  commands:
    biome:
      glob: "*.{js,jsx,mjs,ts,tsx,json,css,astro}"
      exclude: ".claude/**"
      run: yarn biome check --write {staged_files}
      stage_fixed: true
    sort-package-json:
      glob: "package.json"
      run: npx sort-package-json
      stage_fixed: true
    typecheck:
      run: yarn typecheck
