pre-commit:
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,css,scss,sass}"
      exclude: ".claude/**"
      run: yarn biome check --write {staged_files}
      stage_fixed: true
    sort-package-json:
      glob: "package.json"
      run: yarn sort-package-json
      stage_fixed: true
    test:
      run: yarn test
