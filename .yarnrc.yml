compressionLevel: mixed

defaultSemverRangePrefix: ""

enableGlobalCache: false

logFilters:
  - code: YN0002
    level: error
  - code: YN0060
    level: error
  - code: YN0068
    level: error
  - code: YN0069
    level: error
  - code: YN0086
    level: error

nodeLinker: node-modules

packageExtensions:
  "@axe-core/playwright@*":
    peerDependenciesMeta:
      playwright-core:
        optional: true
  "@astrojs/language-server@*":
    peerDependencies:
      typescript: "*"
  "@vercel/express@*":
    peerDependencies:
      typescript: ">=4.9.5"
  vercel@*:
    peerDependencies:
      typescript: ">=4.9.5"
  "@napi-rs/wasm-runtime@*":
    peerDependenciesMeta:
      "@emnapi/core":
        optional: true
      "@emnapi/runtime":
        optional: true

yarnPath: .yarn/releases/yarn-4.13.0.cjs
